<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Shuffler Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="overlay-content">
            <h1>Vibe Shuffler</h1>
            <button id="startBtn">Enter Experience</button>
        </div>
    </div>

    <video autoplay muted loop playsinline id="bgVideo">
        <source src="https://www.w3schools.com/howto/rain.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>Vibe Shuffler</h1>
        <button id="apiBtn" class="secondary-btn">Load Random Users (API)</button>
        <textarea id="nameInput" placeholder="Enter names..."></textarea>
        <div class="button-group">
            <button id="shuffleBtn">SHUFFLE</button>
            <button id="clearBtn">CLEAR</button>
        </div>
        <ul id="nameList"></ul>
    </div>

    <audio id="shuffleSound" src="https://www.soundjay.com/buttons/sounds/button-16.mp3" preload="auto"></audio>
    <audio id="apiSound" src="https://www.soundjay.com/buttons/sounds/button-3.mp3" preload="auto"></audio>
    <audio id="clearSound" src="https://www.soundjay.com/buttons/sounds/button-10.mp3" preload="auto"></audio>
    <audio id="bgMusic" loop src="https://www.soundjay.com/nature/sounds/rain-03.mp3"></audio>

    <script src="script.js"></script>
</body>
</html>
