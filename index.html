<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Vibe Shuffler Elite</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="overlay">
        <div class="overlay-content">
            <h1>Vibe Shuffler</h1>
            <button id="startBtn">START EXPERIENCE</button>
        </div>
    </div>

    <video loop playsinline id="bgVideo">
        <source src="https://videos.pexels.com/video-files/4763824/4763824-uhd_2560_1440_24fps.mp4" type="video/mp4">
    </video>

    <div class="container">
        <h1>Vibe Shuffler</h1>
        <button id="apiBtn" class="secondary-btn">Load Random Users (API)</button>
        <textarea id="nameInput" placeholder="Enter names..."></textarea>
        
        <div class="button-group">
            <button id="shuffleBtn">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="btn-icon">
                    <polyline points="16 3 21 3 21 8"></polyline>
                    <line x1="4" y1="20" x2="21" y2="3"></line>
                    <polyline points="21 16 21 21 16 21"></polyline>
                    <line x1="15" y1="15" x2="21" y2="21"></line>
                    <line x1="4" y1="4" x2="9" y2="9"></line>
                </svg>
                <span>SHUFFLE</span>
            </button>
            <button id="clearBtn">
                <span>CLEAR</span>
            </button>
        </div>
        
        <ul id="nameList"></ul>
    </div>

    <script src="script.js"></script>
</body>
</html>
